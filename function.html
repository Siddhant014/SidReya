<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- THEME TOGGLE -->
  <button id="theme-toggle" aria-label="Toggle theme">🌙</button>

  <!-- FUNCTION HERO -->
  <div class="fn-hero">
    <button class="fn-back" onclick="history.back()">← Back</button>
    <h1 class="fn-title" id="fn-title"></h1>
    <div style="width:60px"></div>
  </div>

  <!-- FEATURED PHOTOS -->
  <div class="featured-grid" id="featured-grid"></div>

  <!-- VIEW ALL TRIGGER -->
  <div class="view-all-trigger" id="view-all-trigger" style="display:none">
    <button class="view-all-btn" id="view-all-btn">
      📷 View all <span id="photo-count">all</span> photos ↓
    </button>
  </div>

  <!-- FULL GRID -->
  <div id="full-grid-section">
    <div class="grid-section-title">All Photos</div>
    <div class="photo-grid" id="photo-grid"></div>
    <div class="loader" id="grid-loader" style="display:none"></div>
    <div class="error-msg" id="grid-error" style="display:none">
      Photos temporarily unavailable. Please try again later.
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-names" id="footer-names"></div>
    <div id="footer-date"></div>
    <div style="margin-top:0.5rem">Made with ❤️</div>
  </footer>

  <!-- VIDEO MODAL -->
  <div id="video-modal" role="dialog" aria-modal="true">
    <div class="video-modal-inner">
      <button id="vm-close" aria-label="Close video">✕</button>
      <div id="vm-frame"></div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lb-close" aria-label="Close">✕</button>
    <a id="lb-download" download target="_blank" aria-label="Download photo" title="Download">⬇</a>
    <button class="lb-btn" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" src="" alt="Photo" />
    <button class="lb-btn" id="lb-next" aria-label="Next">&#8250;</button>
    <div id="lb-counter"></div>
  </div>

  <script src="config.js"></script>
  <script src="function.js"></script>
</body>
</html>
