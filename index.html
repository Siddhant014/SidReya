<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Our Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="snap-page">

  <!-- THEME TOGGLE -->
  <button id="theme-toggle" aria-label="Toggle theme">🌙</button>

  <!-- SNAP CONTAINER -->
  <div id="snap-container">

    <!-- SNAP 1: HERO -->
    <section class="snap-section hero" id="hero-section">
      <div class="hero-bg">
        <img id="hero-img" src="assets/hero.JPG" alt="" onerror="this.style.display='none'" />
      </div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">A Wedding Story</div>
        <h1 class="hero-names" id="hero-names"></h1>
        <div class="hero-divider"><span></span><span class="diamond">◆</span><span></span></div>
        <p class="hero-date" id="hero-date"></p>
        <p class="hero-tagline" id="hero-tagline"></p>
      </div>
      <div class="scroll-hint">
        <span>Scroll</span>
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- SNAP 2: TEASER -->
    <section class="snap-section teaser-section" id="teaser-section">
      <div class="teaser-content">
        <div class="teaser-label">✦ Our Wedding Teaser ✦</div>
        <div class="teaser-video-wrap" id="teaser-video-wrap"></div>
        <div class="scroll-hint" style="position:relative;bottom:auto;left:auto;transform:none;margin-top:2rem;align-self:center;">
          <span>Continue</span>
          <div class="scroll-line"></div>
        </div>
      </div>
    </section>

    <!-- SNAP 3: MAIN CONTENT (scrollable internally) -->
    <section class="snap-section content-section" id="content-section">

      <div class="section" id="videos-section">
        <div class="section-header">
          <h2 class="section-title">
            <img src="https://fonts.gstatic.com/s/e/notoemoji/latest/1f3ac/512.gif" class="hd-emoji" alt="🎬">
            Our Story — Videos
          </h2>
          <a href="videos.html" class="view-all-link">View All →</a>
        </div>
        <div class="scroll-row-wrap">
          <button class="scroll-btn left" data-target="videos-row">&#8249;</button>
          <div class="scroll-row" id="videos-row"></div>
          <button class="scroll-btn right" data-target="videos-row">&#8250;</button>
        </div>
      </div>

      <div id="functions-container"></div>

      <footer>
        <div class="footer-ornament">◆ ◆ ◆</div>
        <div class="footer-names" id="footer-names"></div>
        <div id="footer-date"></div>
        <div class="footer-credit">Made with ❤️</div>
      </footer>

    </section>

  </div>

  <!-- VIDEO MODAL -->
  <div id="video-modal" role="dialog" aria-modal="true">
    <div class="video-modal-inner">
      <button id="vm-close" aria-label="Close video">✕</button>
      <div id="vm-frame"></div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lb-close" aria-label="Close">✕</button>
    <button class="lb-btn" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" src="" alt="Photo" />
    <button class="lb-btn" id="lb-next" aria-label="Next">&#8250;</button>
    <div id="lb-counter"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
