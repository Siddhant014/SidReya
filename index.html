<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Our Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- THEME TOGGLE -->
  <button id="theme-toggle" aria-label="Toggle theme">🌙</button>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg">
      <!-- Replace src with your hero image path -->
      <img id="hero-img" src="assets/hero.jpg" alt="" onerror="this.style.display='none'" />
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-names" id="hero-names"></h1>
      <p class="hero-date" id="hero-date"></p>
      <p class="hero-tagline" id="hero-tagline"></p>
    </div>
    <div class="scroll-hint">Scroll</div>
  </section>

  <!-- VIDEOS ROW -->
  <section class="section" id="videos-section">
    <div class="section-header">
      <h2 class="section-title">🎬 Our Story — Videos</h2>
    </div>
    <div class="scroll-row-wrap">
      <button class="scroll-btn left" data-target="videos-row">&#8249;</button>
      <div class="scroll-row" id="videos-row"></div>
      <button class="scroll-btn right" data-target="videos-row">&#8250;</button>
    </div>
  </section>

  <!-- FUNCTION SECTIONS — injected by app.js -->
  <div id="functions-container"></div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-names" id="footer-names"></div>
    <div id="footer-date"></div>
    <div style="margin-top:0.5rem">Made with ❤️</div>
  </footer>

  <!-- VIDEO MODAL -->
  <div id="video-modal" role="dialog" aria-modal="true">
    <div class="video-modal-inner">
      <button id="vm-close" aria-label="Close video">✕</button>
      <div id="vm-frame"></div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button id="lb-close" aria-label="Close">✕</button>
    <button class="lb-btn" id="lb-prev" aria-label="Previous">&#8249;</button>
    <img id="lb-img" src="" alt="Photo" />
    <button class="lb-btn" id="lb-next" aria-label="Next">&#8250;</button>
    <div id="lb-counter"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
